!DOCTYPE html>
<html>
  <head>
    <title>Telegram Channel Subscribers</title>
  </head>
  <body>
    <h1>Telegram Channel Subscribers</h1>
    <p id="subscribers-count"></p>

    <script>
      const botToken = '6276949802:AAEuoKA2dcv4qC0dpLDIp_aztrGzb7kWPg8';
      const channelName = 'memeremoded';

      const apiUrl = https://api.telegram.org/bot${botToken}/getChatMembersCount?chat_id=@${channelName};

      fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
          const subscribersCount = data.result;
          document.getElementById('subscribers-count').innerHTML = Total Subscribers: ${subscribersCount};
        })
        .catch(error => console.error(error));
    </script>
  </body>
</html>
